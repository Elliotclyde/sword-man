<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>This Dungeon Eternal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #222;
        font-family: Arial, sans-serif;
      }

      #game-container {
        max-width: 768px;
        margin: auto;
        display: flex;
        flex-direction: column;
      }

      #game {
        display: block;
        line-height: 0;
        width: 100%;
        max-width: 800px;
        aspect-ratio: 4 / 3;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      #mobile-controls {
        display: none;
        width: 100%;
        flex-direction: row;
        justify-content: space-evenly;
        align-items: flex-start;
        gap: 5vw;
        flex-shrink: 0;
        height: 66vw;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        position: relative;
      }

      #grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #buttons-container {
        width: 40vw;
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 4.4vw;
      }

      #joystick-container {
        margin-top: 17.7vw;
        flex: 1;
        max-width: 40vw;
        aspect-ratio: 1;
        position: relative;
        display: flex;
        justify-content: center;
      }

      /* Mobile breakpoint */
      @media (max-width: 768px) {
        #mobile-controls {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game"></div>
      <div id="mobile-controls">
        <canvas id="grid-overlay"></canvas>
        <div id="joystick-container"></div>
        <div id="buttons-container"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>
