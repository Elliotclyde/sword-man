    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #222;
        font-family: Arial, sans-serif;
      }

      #game-container {
        max-width: 768px;
        margin: auto;
        display: flex;
        flex-direction: column;
      }

      #game {
        display: block;
        line-height: 0;
        width: 100%;
        max-width: 800px;
        aspect-ratio: 4 / 3;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      #mobile-controls {
        display: none;
        width: 100%;
        flex-direction: row;
        justify-content: space-evenly;
        align-items: flex-start;
        gap: 5vw;
        flex-shrink: 0;
        height: 66vw;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        position: relative;
      }

      #grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #buttons-container {
        width: 40vw;
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 4.4vw;
      }

      #joystick-container {
        margin-top: 17.7vw;
        flex: 1;
        max-width: 40vw;
        aspect-ratio: 1;
        position: relative;
        display: flex;
        justify-content: center;
      }

      /* Mobile breakpoint */
      @media (max-width: 768px) {
        #mobile-controls {
          display: flex;
        }
      }

      /* Loading spinner styles */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 768px;
        aspect-ratio: 4 / 3;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      #loading-spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #loading-text {
        color: white;
        font-family: "Courier New", monospace;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game"></div>
      <div id="mobile-controls">
        <canvas id="grid-overlay"></canvas>
        <div id="joystick-container"></div>
        <div id="buttons-container"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script type="module" src="game.js"></script>
  </body>
